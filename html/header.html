<header class="header">
  <div class="header-top">
    <h1 id="home-title-button">아무 말 대잔치</h1>

    <div id="profile-menu" class="profile-menu hidden">
      <button id="profile-toggle-button" class="profile-avatar-button" type="button" aria-label="프로필 메뉴 열기">
        <img id="profile-toggle-image" class="profile-avatar-image" alt="프로필 이미지" />
      </button>
      <div id="profile-dropdown" class="profile-dropdown hidden">
        <button id="show-profile-edit-button" type="button">회원정보수정</button>
        <button id="show-password-edit-button" type="button">비밀번호수정</button>
        <button id="logout-button" type="button">로그아웃</button>
      </div>
    </div>
  </div>

  <div class="nav-buttons">
    <button id="show-list-button">목록</button>
    <button id="show-login-button">로그인</button>
    <button id="show-signup-button">회원가입</button>
    <button id="logout-button" class="hidden">로그아웃</button>
  </div>

  <p id="login-status-text" class="login-status-text">로그인하지 않았습니다.</p>
</header>
